<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="nexusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#nexusGradient)" opacity="0.1"/>

  <!-- Main hexagon -->
  <polygon points="256,100 356,156 356,316 256,372 156,316 156,156"
           fill="url(#nexusGradient)"
           filter="url(#glow)"/>

  <!-- Inner hexagon -->
  <polygon points="256,140 306,169 306,303 256,332 206,303 206,169"
           fill="none"
           stroke="#ffffff"
           stroke-width="3"
           opacity="0.8"/>

  <!-- Center dot -->
  <circle cx="256" cy="236" r="8" fill="#ffffff"/>

  <!-- Corner accents -->
  <circle cx="206" cy="169" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="306" cy="169" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="206" cy="303" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="306" cy="303" r="4" fill="#ffffff" opacity="0.6"/>

  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" fill="#9333ea" font-family="Arial, sans-serif" font-size="36" font-weight="bold">NEXUS</text>
</svg>